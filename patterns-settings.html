    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="global-header" id="header-placeholder"></header>
    <div class="mobile-sub-header">
        <div class="sub-header-inner" onclick="toggleSubMenu()">
            <span class="current-page">Patterns</span><i class="ri-arrow-down-s-line" id="subArrow"></i>
        </div>
        <ul class="sub-menu-list" id="mobileSubMenu">
            <li><a href="patterns-overview.html">Overview</a></li>
            <li><a href="patterns-login.html">Login Form</a></li>
            <li><a href="patterns-search.html">Search</a></li>
            <li><a href="patterns-settings.html" class="active">Settings</a></li>
            <li><a href="patterns-empty-states.html">Empty States</a></li>
            <li><a href="patterns-errors.html">Errors</a></li>
            <li><a href="patterns-onboarding.html">Onboarding</a></li>
        </ul>
    </div>

    <div class="layout-container">
        <aside class="sidebar" id="sidebar-placeholder"></aside>
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Settings</h1>
                <p class="page-desc">사용자가 앱의 환경을 개인화하거나 제어할 수 있는 설정 화면 패턴입니다.</p>
            </div>

            <section>
                <h2 class="sub-section-title">List Layout</h2>
                <div class="visual-box" style="background:#F4F7FC;">
                    <div class="demo-settings-list">
                        <div class="demo-setting-item">
                            <div class="demo-setting-text">
                                <h5>Notifications</h5>
                                <p>Enable push notifications</p>
                            </div>
                            <label class="demo-switch"><input type="checkbox" checked><span class="slider"></span></label>
                        </div>
                        <div class="demo-setting-item">
                            <div class="demo-setting-text">
                                <h5>Dark Mode</h5>
                                <p>Adjust appearance</p>
                            </div>
                            <label class="demo-switch"><input type="checkbox"><span class="slider"></span></label>
                        </div>
                    </div>
                </div>
            </section>

            <div class="content-footer">© 2025 newtype imageworks. All rights reserved.</div>
        </main>
    </div>
    <script src="script.js"></script>
    <script>loadComponent('header-placeholder', 'layout/header.html', 'patterns'); loadComponent('sidebar-placeholder', 'layout/sidebar-patterns.html', 'patterns-settings.html');</script>
